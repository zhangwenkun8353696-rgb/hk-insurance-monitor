<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港保险舆论监测系统</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #1a1d2e;
            --bg-card: #222640;
            --bg-hover: #2a2f4a;
            --text-primary: #e8eaf0;
            --text-secondary: #8b90a5;
            --text-muted: #5c6078;
            --accent-blue: #4e7cff;
            --accent-blue-dim: rgba(78,124,255,0.15);
            --accent-green: #22c55e;
            --accent-green-dim: rgba(34,197,94,0.15);
            --accent-red: #ef4444;
            --accent-red-dim: rgba(239,68,68,0.15);
            --accent-yellow: #f59e0b;
            --accent-yellow-dim: rgba(245,158,11,0.15);
            --accent-purple: #a855f7;
            --accent-purple-dim: rgba(168,85,247,0.15);
            --border: #2e3352;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0,0,0,0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ===== Header ===== */
        .header {
            background: linear-gradient(135deg, #1a1d2e 0%, #222640 100%);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .header-logo {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: #fff;
        }
        .header-title {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(90deg, #fff, #a0b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-subtitle {
            font-size: 12px;
            color: var(--text-muted);
        }
        .header-right {
            display: flex; align-items: center; gap: 16px;
        }
        .last-updated {
            font-size: 12px; color: var(--text-muted);
        }
        .btn-refresh {
            background: var(--accent-blue);
            border: none;
            color: #fff;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            display: flex; align-items: center; gap: 6px;
            transition: all 0.2s;
        }
        .btn-refresh:hover { background: #3d6ae8; transform: translateY(-1px); }
        .btn-refresh.loading i { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== Layout ===== */
        .main-container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 24px 32px;
        }

        /* ===== Tabs ===== */
        .tabs {
            display: flex; gap: 4px;
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 24px;
            width: fit-content;
        }
        .tab {
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s;
            display: flex; align-items: center; gap: 6px;
            border: none; background: none;
        }
        .tab:hover { color: var(--text-primary); background: var(--bg-hover); }
        .tab.active {
            background: var(--accent-blue);
            color: #fff;
        }
        .tab .badge {
            background: rgba(255,255,255,0.2);
            padding: 1px 7px;
            border-radius: 10px;
            font-size: 11px;
        }

        /* ===== Stats Cards ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
        }
        .stat-card.blue::before { background: var(--accent-blue); }
        .stat-card.red::before { background: var(--accent-red); }
        .stat-card.green::before { background: var(--accent-green); }
        .stat-card.yellow::before { background: var(--accent-yellow); }
        .stat-icon {
            width: 42px; height: 42px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            margin-bottom: 12px;
        }
        .stat-card.blue .stat-icon { background: var(--accent-blue-dim); color: var(--accent-blue); }
        .stat-card.red .stat-icon { background: var(--accent-red-dim); color: var(--accent-red); }
        .stat-card.green .stat-icon { background: var(--accent-green-dim); color: var(--accent-green); }
        .stat-card.yellow .stat-icon { background: var(--accent-yellow-dim); color: var(--accent-yellow); }
        .stat-value { font-size: 28px; font-weight: 700; margin-bottom: 2px; }
        .stat-label { font-size: 13px; color: var(--text-secondary); }

        /* ===== Content Grid ===== */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }
        .content-grid.full { grid-template-columns: 1fr; }

        /* ===== Card ===== */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .card-title {
            font-size: 15px;
            font-weight: 600;
            display: flex; align-items: center; gap: 8px;
        }
        .card-body { padding: 20px; }

        /* ===== Sentiment Donut ===== */
        .chart-container {
            position: relative;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== Alert List ===== */
        .alert-list { display: flex; flex-direction: column; gap: 10px; }
        .alert-item {
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 14px 16px;
            border-left: 4px solid;
            cursor: pointer;
            transition: all 0.2s;
        }
        .alert-item:hover { background: var(--bg-hover); transform: translateX(4px); }
        .alert-item.high { border-color: var(--accent-red); }
        .alert-item.medium { border-color: var(--accent-yellow); }
        .alert-item.low { border-color: var(--accent-blue); }
        .alert-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .alert-meta {
            font-size: 11px;
            color: var(--text-muted);
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
        }
        .alert-tag {
            padding: 1px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
        }
        .alert-tag.high { background: var(--accent-red-dim); color: var(--accent-red); }
        .alert-tag.medium { background: var(--accent-yellow-dim); color: var(--accent-yellow); }

        /* ===== Company Stats ===== */
        .company-list { display: flex; flex-direction: column; gap: 12px; }
        .company-row {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .company-row:hover { background: var(--bg-hover); }
        .company-name {
            font-size: 13px; font-weight: 600;
            min-width: 100px;
        }
        .company-name-en {
            font-size: 11px; color: var(--text-muted);
        }
        .company-bar-container {
            flex: 1;
            display: flex; align-items: center; gap: 4px;
            height: 22px;
        }
        .company-bar-seg {
            height: 100%;
            border-radius: 4px;
            min-width: 2px;
            transition: width 0.5s;
        }
        .company-bar-seg.pos { background: var(--accent-green); }
        .company-bar-seg.neu { background: var(--accent-blue); opacity: 0.5; }
        .company-bar-seg.neg { background: var(--accent-red); }
        .company-count {
            font-size: 12px; font-weight: 600;
            min-width: 28px; text-align: right;
        }

        /* ===== Topic Grid ===== */
        .topic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }
        .topic-card {
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .topic-card:hover { background: var(--bg-hover); transform: translateY(-2px); }
        .topic-icon { font-size: 28px; margin-bottom: 6px; }
        .topic-name { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
        .topic-count { font-size: 20px; font-weight: 700; color: var(--accent-blue); }

        /* ===== News Tab ===== */
        .filters-bar {
            display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center;
        }
        .filter-select {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }
        .filter-select:focus { border-color: var(--accent-blue); }
        .news-list { display: flex; flex-direction: column; gap: 14px; }
        .news-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .news-item:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        .news-header {
            display: flex; align-items: flex-start; justify-content: space-between;
            margin-bottom: 10px; gap: 16px;
        }
        .news-title {
            font-size: 15px; font-weight: 600;
            flex: 1;
        }
        .sentiment-badge {
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
        }
        .sentiment-badge.positive { background: var(--accent-green-dim); color: var(--accent-green); }
        .sentiment-badge.neutral { background: var(--accent-blue-dim); color: var(--accent-blue); }
        .sentiment-badge.negative { background: var(--accent-red-dim); color: var(--accent-red); }
        .news-summary {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .news-footer {
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 8px;
        }
        .news-tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .news-tag {
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 11px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }
        .news-tag.company { background: var(--accent-purple-dim); color: var(--accent-purple); }
        .news-tag.topic { background: var(--accent-blue-dim); color: var(--accent-blue); }
        .news-meta {
            font-size: 11px;
            color: var(--text-muted);
            display: flex; align-items: center; gap: 12px;
        }

        /* ===== Strategy Panel ===== */
        .strategy-section { margin-bottom: 24px; }
        .strategy-title {
            display: flex; align-items: center; gap: 8px;
            font-size: 14px; font-weight: 600; margin-bottom: 12px;
        }
        .strategy-list { display: flex; flex-direction: column; gap: 8px; }
        .strategy-item {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            display: flex; align-items: flex-start; gap: 10px;
            line-height: 1.6;
        }
        .strategy-item .num {
            background: var(--accent-blue-dim);
            color: var(--accent-blue);
            min-width: 24px; height: 24px;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700;
        }

        /* ===== Modal ===== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 90%;
            max-width: 640px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .modal-header h3 { font-size: 16px; font-weight: 700; }
        .modal-close {
            background: none; border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
        }
        .modal-close:hover { color: var(--text-primary); }
        .modal-body { padding: 24px; }

        /* ===== Risk Badge ===== */
        .risk-badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
        }
        .risk-badge.high { background: var(--accent-red-dim); color: var(--accent-red); }
        .risk-badge.medium { background: var(--accent-yellow-dim); color: var(--accent-yellow); }
        .risk-badge.low { background: var(--accent-green-dim); color: var(--accent-green); }

        /* ===== Tab Panels ===== */
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* ===== Responsive: Tablet ===== */
        @media (max-width: 900px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .content-grid { grid-template-columns: 1fr; }
            .header { padding: 12px 16px; }
            .main-container { padding: 16px; }
            .topic-grid { grid-template-columns: repeat(3, 1fr); }
        }

        /* ===== Responsive: Mobile ===== */
        @media (max-width: 520px) {
            body { -webkit-text-size-adjust: 100%; }

            .header {
                padding: 10px 12px;
                gap: 8px;
            }
            .header-logo {
                width: 34px; height: 34px;
                font-size: 16px; border-radius: 8px;
            }
            .header-title { font-size: 15px; }
            .header-subtitle { display: none; }
            .header-right { gap: 8px; }
            .last-updated { display: none; }
            .btn-refresh {
                padding: 7px 12px; font-size: 12px;
            }
            .btn-refresh span.btn-text { display: none; }

            .main-container { padding: 12px; }

            /* Tabs: horizontal scroll */
            .tabs {
                width: 100%;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
                margin-bottom: 16px;
                padding: 3px;
                gap: 2px;
            }
            .tabs::-webkit-scrollbar { display: none; }
            .tab {
                padding: 7px 12px;
                font-size: 12px;
                white-space: nowrap;
                flex-shrink: 0;
                gap: 4px;
            }
            .tab .badge { font-size: 10px; padding: 0 5px; }

            /* Stats: 2x2 grid, compact */
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
                margin-bottom: 16px;
            }
            .stat-card { padding: 14px 12px; }
            .stat-icon {
                width: 34px; height: 34px;
                font-size: 16px; margin-bottom: 8px;
            }
            .stat-value { font-size: 22px; }
            .stat-label { font-size: 11px; }

            /* Content grid: single column */
            .content-grid {
                grid-template-columns: 1fr;
                gap: 12px;
                margin-bottom: 16px;
            }

            /* Cards */
            .card { border-radius: 10px; }
            .card-header { padding: 12px 14px; }
            .card-title { font-size: 13px; gap: 6px; }
            .card-body { padding: 14px; }

            /* Chart */
            .chart-container { height: 180px; }

            /* Topics: 2 columns */
            .topic-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            .topic-card { padding: 12px 8px; }
            .topic-icon { font-size: 22px; margin-bottom: 4px; }
            .topic-name { font-size: 11px; }
            .topic-count { font-size: 18px; }

            /* Alerts */
            .alert-item { padding: 12px; }
            .alert-title { font-size: 12px; }
            .alert-meta { font-size: 10px; gap: 6px; }

            /* Company rows */
            .company-row {
                padding: 8px 10px;
                gap: 8px;
                flex-wrap: wrap;
            }
            .company-name { font-size: 12px; min-width: 80px; }
            .company-name-en { font-size: 10px; }
            .company-bar-container { min-width: 60px; }

            /* Filters: 2 per row */
            .filters-bar {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
                margin-bottom: 14px;
            }
            .filter-select {
                width: 100%;
                padding: 8px 10px;
                font-size: 12px;
            }

            /* News items */
            .news-list { gap: 10px; }
            .news-item {
                padding: 14px;
                border-radius: 10px;
            }
            .news-item:hover { transform: none; }
            .news-header { gap: 8px; margin-bottom: 8px; }
            .news-title { font-size: 14px; line-height: 1.5; }
            .sentiment-badge { font-size: 10px; padding: 2px 8px; }
            .news-summary {
                font-size: 12px; line-height: 1.6;
                margin-bottom: 10px;
                -webkit-line-clamp: 2;
            }
            .news-footer { gap: 6px; }
            .news-tags { gap: 4px; }
            .news-tag { font-size: 10px; padding: 2px 7px; }
            .news-meta { font-size: 10px; gap: 8px; }
            .risk-badge { font-size: 10px; padding: 2px 7px; }

            /* Modal: near-fullscreen on mobile */
            .modal-overlay { align-items: flex-end; }
            .modal {
                width: 100%;
                max-width: 100%;
                max-height: 90vh;
                border-radius: 16px 16px 0 0;
                animation: slideUp 0.25s ease;
            }
            @keyframes slideUp {
                from { transform: translateY(100%); }
                to { transform: translateY(0); }
            }
            .modal-header { padding: 16px; }
            .modal-header h3 { font-size: 15px; }
            .modal-body { padding: 16px; }
            .modal-body h3 { font-size: 14px !important; }
            .modal-body p { font-size: 13px !important; }
            .strategy-item { padding: 10px 12px; font-size: 12px; }
            .strategy-item .num { min-width: 22px; height: 22px; font-size: 11px; }

            /* Company chart on mobile */
            .chart-container[style*="300px"] { height: 240px !important; }
        }

        /* ===== Extra small phones ===== */
        @media (max-width: 360px) {
            .stats-grid { gap: 8px; }
            .stat-card { padding: 10px 8px; }
            .stat-value { font-size: 20px; }
            .stat-icon { width: 28px; height: 28px; font-size: 14px; }
            .tab { padding: 6px 10px; font-size: 11px; }
            .header-title { font-size: 13px; }
            .topic-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* ===== Safe area for notched phones ===== */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            body { padding-bottom: env(safe-area-inset-bottom); }
        }

        /* ===== Touch improvements ===== */
        @media (hover: none) and (pointer: coarse) {
            .news-item:hover { transform: none; box-shadow: none; }
            .alert-item:hover { transform: none; }
            .topic-card:hover { transform: none; }
            .company-row:hover { background: var(--bg-secondary); }
            .btn-refresh:hover { transform: none; }
            .btn-refresh:active { background: #3d6ae8; }
            .news-item:active { border-color: var(--accent-blue); }
            .alert-item:active { background: var(--bg-hover); }
        }

        /* ===== Empty State ===== */
        .empty-state {
            text-align: center; padding: 40px 20px;
            color: var(--text-muted);
        }
        .empty-state i { font-size: 48px; margin-bottom: 12px; display: block; }

        /* ===== Trend mini chart ===== */
        .trend-chart-container { height: 200px; position: relative; }
    </style>
</head>
<body>

<!-- Header -->
<header class="header">
    <div class="header-left">
        <div class="header-logo"><i class="ri-shield-check-line"></i></div>
        <div>
            <div class="header-title">香港保险舆论监测系统</div>
            <div class="header-subtitle">HK Insurance Sentiment Monitor</div>
        </div>
    </div>
    <div class="header-right">
        <span class="last-updated" id="lastUpdated">--</span>
        <button class="btn-refresh" id="btnRefresh" onclick="refreshData()">
            <i class="ri-refresh-line"></i> <span class="btn-text">刷新数据</span>
        </button>
    </div>
</header>

<!-- Main Content -->
<div class="main-container">

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab active" data-tab="dashboard" onclick="switchTab('dashboard')">
            <i class="ri-dashboard-3-line"></i> 舆情看板
        </button>
        <button class="tab" data-tab="news" onclick="switchTab('news')">
            <i class="ri-newspaper-line"></i> 新闻列表 <span class="badge" id="newsBadge">0</span>
        </button>
        <button class="tab" data-tab="alerts" onclick="switchTab('alerts')">
            <i class="ri-alarm-warning-line"></i> 风险预警 <span class="badge" id="alertsBadge">0</span>
        </button>
        <button class="tab" data-tab="companies" onclick="switchTab('companies')">
            <i class="ri-building-2-line"></i> 公司分析
        </button>
    </div>

    <!-- ===== Dashboard Tab ===== -->
    <div class="tab-panel active" id="panel-dashboard">

        <!-- Stats Cards -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card blue">
                <div class="stat-icon"><i class="ri-newspaper-line"></i></div>
                <div class="stat-value" id="statTotal">--</div>
                <div class="stat-label">今日舆情总数</div>
            </div>
            <div class="stat-card red">
                <div class="stat-icon"><i class="ri-emotion-unhappy-line"></i></div>
                <div class="stat-value" id="statNegative">--</div>
                <div class="stat-label">负面舆情</div>
            </div>
            <div class="stat-card green">
                <div class="stat-icon"><i class="ri-emotion-happy-line"></i></div>
                <div class="stat-value" id="statPositive">--</div>
                <div class="stat-label">正面舆情</div>
            </div>
            <div class="stat-card yellow">
                <div class="stat-icon"><i class="ri-alarm-warning-line"></i></div>
                <div class="stat-value" id="statAlerts">--</div>
                <div class="stat-label">风险预警</div>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="content-grid">
            <!-- Sentiment Chart -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title"><i class="ri-pie-chart-line"></i> 舆情情感分布</span>
                </div>
                <div class="card-body">
                    <div class="chart-container">
                        <canvas id="sentimentChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Topic Distribution -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title"><i class="ri-hashtag"></i> 话题分类</span>
                </div>
                <div class="card-body">
                    <div class="topic-grid" id="topicGrid"></div>
                </div>
            </div>
        </div>

        <!-- Alerts & Companies -->
        <div class="content-grid">
            <!-- Alerts -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title"><i class="ri-alarm-warning-line" style="color:var(--accent-red)"></i> 负面舆情预警</span>
                </div>
                <div class="card-body">
                    <div class="alert-list" id="alertList"></div>
                </div>
            </div>

            <!-- Company Stats -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title"><i class="ri-building-2-line"></i> 公司舆情概览</span>
                </div>
                <div class="card-body">
                    <div class="company-list" id="companyList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== News Tab ===== -->
    <div class="tab-panel" id="panel-news">
        <div class="filters-bar">
            <select class="filter-select" id="filterSentiment" onchange="applyFilters()">
                <option value="all">全部情感</option>
                <option value="positive">🟢 正面</option>
                <option value="neutral">🔵 中性</option>
                <option value="negative">🔴 负面</option>
            </select>
            <select class="filter-select" id="filterCompany" onchange="applyFilters()">
                <option value="all">全部公司</option>
            </select>
            <select class="filter-select" id="filterTopic" onchange="applyFilters()">
                <option value="all">全部话题</option>
            </select>
            <select class="filter-select" id="filterRisk" onchange="applyFilters()">
                <option value="all">全部风险</option>
                <option value="high">🔴 高风险</option>
                <option value="medium">🟡 中风险</option>
                <option value="low">🟢 低风险</option>
            </select>
        </div>
        <div class="news-list" id="newsList"></div>
    </div>

    <!-- ===== Alerts Tab ===== -->
    <div class="tab-panel" id="panel-alerts">
        <div class="content-grid full">
            <div class="card">
                <div class="card-header">
                    <span class="card-title"><i class="ri-alarm-warning-line" style="color:var(--accent-red)"></i> 全部风险预警</span>
                </div>
                <div class="card-body">
                    <div class="alert-list" id="alertListFull"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== Companies Tab ===== -->
    <div class="tab-panel" id="panel-companies">
        <div class="content-grid">
            <div class="card">
                <div class="card-header">
                    <span class="card-title"><i class="ri-bar-chart-grouped-line"></i> 公司舆情对比</span>
                </div>
                <div class="card-body">
                    <div class="chart-container" style="height:300px">
                        <canvas id="companyChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">
                    <span class="card-title"><i class="ri-list-check-3"></i> 公司详细统计</span>
                </div>
                <div class="card-body">
                    <div class="company-list" id="companyListFull"></div>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="newsModal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modalTitle">新闻详情</h3>
            <button class="modal-close" onclick="closeModal()"><i class="ri-close-line"></i></button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script>
// ============================================================
// State
// ============================================================
let dashboardData = null;
let newsData = [];
let companiesData = [];
let topicsData = {};
let sentimentChartInstance = null;
let companyChartInstance = null;

const SENTIMENT_LABELS = { positive: "正面", neutral: "中性", negative: "负面" };
const RISK_LABELS = { high: "高风险", medium: "中风险", low: "低风险" };
const RISK_ICONS = { high: "ri-error-warning-fill", medium: "ri-alert-fill", low: "ri-information-fill" };

// ============================================================
// API
// ============================================================
const API_BASE = "";

async function fetchJSON(url) {
    const resp = await fetch(API_BASE + url);
    const data = await resp.json();
    if (!data.success) throw new Error(data.error || "API Error");
    return data.data;
}

// ============================================================
// Data Loading
// ============================================================
async function loadDashboard() {
    dashboardData = await fetchJSON("/api/dashboard");

    // Stats
    document.getElementById("statTotal").textContent = dashboardData.total_news;
    document.getElementById("statNegative").textContent = dashboardData.sentiment_distribution.negative;
    document.getElementById("statPositive").textContent = dashboardData.sentiment_distribution.positive;
    document.getElementById("statAlerts").textContent = dashboardData.alerts.length;

    // Badges
    document.getElementById("alertsBadge").textContent = dashboardData.alerts.length;

    // Last Updated
    const dt = new Date(dashboardData.last_updated);
    document.getElementById("lastUpdated").textContent =
        "最后更新: " + dt.toLocaleString("zh-CN", { hour12: false });

    // Sentiment Chart
    renderSentimentChart(dashboardData.sentiment_distribution);

    // Topics
    renderTopics(dashboardData.topic_distribution);

    // Alerts
    renderAlerts(dashboardData.alerts, "alertList", 5);
    renderAlerts(dashboardData.alerts, "alertListFull");

    // Company Stats
    renderCompanyList(dashboardData.company_stats, "companyList");
    renderCompanyList(dashboardData.company_stats, "companyListFull");
}

async function loadNews() {
    const params = new URLSearchParams();
    const s = document.getElementById("filterSentiment").value;
    const c = document.getElementById("filterCompany").value;
    const t = document.getElementById("filterTopic").value;
    const r = document.getElementById("filterRisk").value;
    if (s !== "all") params.set("sentiment", s);
    if (c !== "all") params.set("company", c);
    if (t !== "all") params.set("topic", t);
    if (r !== "all") params.set("risk", r);

    newsData = await fetchJSON("/api/news?" + params.toString());
    document.getElementById("newsBadge").textContent = newsData.length;
    renderNewsList(newsData);
}

async function loadCompanies() {
    companiesData = await fetchJSON("/api/companies");
    // Populate filter
    const sel = document.getElementById("filterCompany");
    sel.innerHTML = '<option value="all">全部公司</option>';
    companiesData.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.id;
        opt.textContent = c.name;
        sel.appendChild(opt);
    });
}

async function loadTopics() {
    topicsData = await fetchJSON("/api/topics");
    const sel = document.getElementById("filterTopic");
    sel.innerHTML = '<option value="all">全部话题</option>';
    Object.entries(topicsData).forEach(([k, v]) => {
        const opt = document.createElement("option");
        opt.value = k;
        opt.textContent = v.icon + " " + v.name;
        sel.appendChild(opt);
    });
}

// ============================================================
// Renderers
// ============================================================
function renderSentimentChart(dist) {
    const ctx = document.getElementById("sentimentChart").getContext("2d");
    if (sentimentChartInstance) sentimentChartInstance.destroy();
    sentimentChartInstance = new Chart(ctx, {
        type: "doughnut",
        data: {
            labels: ["正面", "中性", "负面"],
            datasets: [{
                data: [dist.positive, dist.neutral, dist.negative],
                backgroundColor: ["#22c55e", "rgba(78,124,255,0.6)", "#ef4444"],
                borderWidth: 0,
                hoverOffset: 8,
            }],
        },
        options: {
            cutout: "65%",
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: "bottom",
                    labels: { color: "#8b90a5", padding: 16, font: { size: 12 } },
                },
            },
        },
    });
}

function renderTopics(dist) {
    const grid = document.getElementById("topicGrid");
    grid.innerHTML = "";
    Object.entries(dist).forEach(([k, v]) => {
        const card = document.createElement("div");
        card.className = "topic-card";
        card.onclick = () => { switchTab("news"); document.getElementById("filterTopic").value = k; applyFilters(); };
        card.innerHTML = `
            <div class="topic-icon">${v.icon}</div>
            <div class="topic-name">${v.name}</div>
            <div class="topic-count">${v.count}</div>
        `;
        grid.appendChild(card);
    });
}

function renderAlerts(alerts, containerId, limit) {
    const container = document.getElementById(containerId);
    const items = limit ? alerts.slice(0, limit) : alerts;
    if (items.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="ri-shield-check-line"></i><p>暂无风险预警</p></div>';
        return;
    }
    container.innerHTML = items.map(a => `
        <div class="alert-item ${a.risk_level}" onclick="showNewsDetail('${a.id}')">
            <div class="alert-title">${a.title}</div>
            <div class="alert-meta">
                <span class="alert-tag ${a.risk_level}">${RISK_LABELS[a.risk_level]}</span>
                <span>${a.source}</span>
                <span>${formatTime(a.published)}</span>
                ${a.companies.map(c => `<span style="color:var(--accent-purple)">${getCompanyName(c)}</span>`).join("")}
            </div>
        </div>
    `).join("");
}

function renderCompanyList(stats, containerId) {
    const container = document.getElementById(containerId);
    const entries = Object.values(stats).sort((a, b) => b.total - a.total);
    if (entries.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="ri-building-2-line"></i><p>暂无公司数据</p></div>';
        return;
    }
    const maxTotal = Math.max(...entries.map(e => e.total));
    container.innerHTML = entries.map(e => {
        const pW = Math.round((e.positive / maxTotal) * 100);
        const nW = Math.round((e.negative / maxTotal) * 100);
        const uW = Math.round((e.neutral / maxTotal) * 100);
        return `
        <div class="company-row">
            <div>
                <div class="company-name">${e.name}</div>
                <div class="company-name-en">${e.name_en}</div>
            </div>
            <div class="company-bar-container">
                <div class="company-bar-seg pos" style="width:${pW}%"></div>
                <div class="company-bar-seg neu" style="width:${uW}%"></div>
                <div class="company-bar-seg neg" style="width:${nW}%"></div>
            </div>
            <div class="company-count">${e.total}</div>
        </div>`;
    }).join("");

    // Company chart (only for full panel)
    if (containerId === "companyListFull") renderCompanyChart(entries);
}

function renderCompanyChart(entries) {
    const ctx = document.getElementById("companyChart").getContext("2d");
    if (companyChartInstance) companyChartInstance.destroy();
    companyChartInstance = new Chart(ctx, {
        type: "bar",
        data: {
            labels: entries.map(e => e.name),
            datasets: [
                { label: "正面", data: entries.map(e => e.positive), backgroundColor: "#22c55e", borderRadius: 4 },
                { label: "中性", data: entries.map(e => e.neutral), backgroundColor: "rgba(78,124,255,0.5)", borderRadius: 4 },
                { label: "负面", data: entries.map(e => e.negative), backgroundColor: "#ef4444", borderRadius: 4 },
            ],
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { stacked: true, ticks: { color: "#8b90a5", font: { size: 11 } }, grid: { display: false } },
                y: { stacked: true, ticks: { color: "#8b90a5", stepSize: 1 }, grid: { color: "rgba(46,51,82,0.5)" } },
            },
            plugins: {
                legend: { position: "top", labels: { color: "#8b90a5", padding: 16, font: { size: 11 } } },
            },
        },
    });
}

function renderNewsList(items) {
    const container = document.getElementById("newsList");
    if (items.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="ri-newspaper-line"></i><p>暂无符合条件的新闻</p></div>';
        return;
    }
    container.innerHTML = items.map(n => `
        <div class="news-item" onclick="showNewsDetail('${n.id}')">
            <div class="news-header">
                <div class="news-title">${n.title}</div>
                <span class="sentiment-badge ${n.sentiment}">${SENTIMENT_LABELS[n.sentiment]}</span>
            </div>
            <div class="news-summary">${n.summary}</div>
            <div class="news-footer">
                <div class="news-tags">
                    ${n.companies.map(c => `<span class="news-tag company">${getCompanyName(c)}</span>`).join("")}
                    ${n.topics.map(t => `<span class="news-tag topic">${getTopicName(t)}</span>`).join("")}
                    ${n.risk_level !== "low" ? `<span class="risk-badge ${n.risk_level}"><i class="${RISK_ICONS[n.risk_level]}"></i> ${RISK_LABELS[n.risk_level]}</span>` : ""}
                </div>
                <div class="news-meta">
                    <span><i class="ri-global-line"></i> ${n.source}</span>
                    <span><i class="ri-time-line"></i> ${formatTime(n.published)}</span>
                </div>
            </div>
        </div>
    `).join("");
}

// ============================================================
// Detail Modal
// ============================================================
function showNewsDetail(id) {
    const news = newsData.find(n => n.id === id) ||
                 (dashboardData && dashboardData.alerts.find(a => a.id === id));
    if (!news) return;

    document.getElementById("modalTitle").textContent = "舆情详情";
    const body = document.getElementById("modalBody");

    let strategiesHtml = "";
    if (news.strategies && news.strategies.length > 0) {
        strategiesHtml = `
            <div class="strategy-section">
                <div class="strategy-title">
                    <i class="ri-lightbulb-flash-line" style="color:var(--accent-yellow)"></i> 建议应对策略
                </div>
                <div class="strategy-list">
                    ${news.strategies.map((s, i) => `
                        <div class="strategy-item">
                            <span class="num">${i + 1}</span>
                            <span>${s}</span>
                        </div>
                    `).join("")}
                </div>
            </div>
        `;
    }

    body.innerHTML = `
        <div style="margin-bottom:16px">
            <h3 style="font-size:16px;font-weight:700;margin-bottom:8px;line-height:1.5">${news.title}</h3>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px">
                <span class="sentiment-badge ${news.sentiment}">${SENTIMENT_LABELS[news.sentiment]} (${news.sentiment_score})</span>
                <span class="risk-badge ${news.risk_level}"><i class="${RISK_ICONS[news.risk_level]}"></i> ${RISK_LABELS[news.risk_level]}</span>
            </div>
            <p style="font-size:14px;color:var(--text-secondary);line-height:1.8">${news.summary}</p>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">
            ${news.companies.map(c => `<span class="news-tag company">${getCompanyName(c)}</span>`).join("")}
            ${news.topics.map(t => `<span class="news-tag topic">${getTopicName(t)}</span>`).join("")}
        </div>
        <div class="news-meta" style="margin-bottom:20px">
            <span><i class="ri-global-line"></i> ${news.source}</span>
            <span><i class="ri-time-line"></i> ${formatTime(news.published)}</span>
        </div>
        ${strategiesHtml}
    `;

    document.getElementById("newsModal").classList.add("show");
}

function closeModal() {
    document.getElementById("newsModal").classList.remove("show");
}
document.getElementById("newsModal").addEventListener("click", e => {
    if (e.target === e.currentTarget) closeModal();
});

// ============================================================
// Tab Switching
// ============================================================
function switchTab(tab) {
    document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === tab));
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.toggle("active", p.id === "panel-" + tab));
}

// ============================================================
// Filters
// ============================================================
function applyFilters() {
    loadNews();
}

// ============================================================
// Helpers
// ============================================================
function getCompanyName(id) {
    const c = companiesData.find(c => c.id === id);
    return c ? c.name : id;
}
function getTopicName(id) {
    const t = topicsData[id];
    return t ? t.icon + " " + t.name : id;
}
function formatTime(iso) {
    const d = new Date(iso);
    const now = new Date();
    const diff = (now - d) / 1000 / 60;
    if (diff < 60) return Math.round(diff) + "分钟前";
    if (diff < 1440) return Math.round(diff / 60) + "小时前";
    return d.toLocaleDateString("zh-CN", { month: "short", day: "numeric" }) + " " +
           d.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", hour12: false });
}

// ============================================================
// Refresh
// ============================================================
async function refreshData() {
    const btn = document.getElementById("btnRefresh");
    btn.classList.add("loading");
    try {
        await Promise.all([loadDashboard(), loadNews(), loadCompanies(), loadTopics()]);
    } catch (err) {
        console.error("Refresh failed:", err);
    } finally {
        btn.classList.remove("loading");
    }
}

// ============================================================
// Init
// ============================================================
(async function init() {
    await loadCompanies();
    await loadTopics();
    await Promise.all([loadDashboard(), loadNews()]);
})();
</script>

</body>
</html>
